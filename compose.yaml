services:
  fetchmailmgr:
    image: ghcr.io/jeboehm/fetchmailmgr:latest
    build:
      context: .
      cache_from:
        - type=registry,ref=ghcr.io/jeboehm/fetchmailmgr:buildcache
    read_only: true
    ports:
      - 3000:3000
    environment:
      REDIS_URL: redis://redis:6379/0
      DEBUG: 'true'
    volumes:
      - ./src:/app/src:ro
    tmpfs:
      - /run/fetchmailmgr:mode=0755,uid=65534,gid=65534

  redis:
    image: redis:7-alpine@sha256:7a7c6b5c49a6896d0a58ee0c6dc0dcabe14f30f0a2f7d2d1362d276fa2d43166
